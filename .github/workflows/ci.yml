name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Static checks (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Compile-check message_flight.py
        run: python -m py_compile message_flight.py

      - name: AST-parse message_flight.py
        run: python -c "import ast; ast.parse(open('message_flight.py').read())"

      - name: Validate pyproject.toml
        run: |
          pip install tomli
          python -c "import tomli; tomli.loads(open('pyproject.toml').read())"

  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --pre .
          pip install pyinstaller pywin32

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm --clean MessageFlight.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MessageFlight-windows-exe
          path: dist/MessageFlight.exe
          if-no-files-found: error
